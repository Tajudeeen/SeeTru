name: seetru
description: SeeTru - Crypto Intelligence & Portfolio Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management & Navigation ─────────────────────────────
  get: ^4.6.6
  get_storage: ^2.1.1

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.3
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.3

  # ── Authentication ─────────────────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3

  # ── Networking ─────────────────────────────────────────────────
  dio: ^5.4.3+1
  rxdart: ^0.28.0

  # ── Local Storage ─────────────────────────────────────────────
  shared_preferences: ^2.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # ── UI Components ─────────────────────────────────────────────
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # ── Forms & Input ──────────────────────────────────────────────
  pinput: ^5.0.0

  # ── Media & Files ─────────────────────────────────────────────
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  path_provider: ^2.1.3

  # ── Notifications ─────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Security & Biometrics ─────────────────────────────────────
  local_auth: ^2.3.0

  # ── Utilities ─────────────────────────────────────────────────
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  permission_handler: ^11.3.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    # - assets/lottie/

